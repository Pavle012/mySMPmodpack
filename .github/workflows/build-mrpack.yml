name: Build .mrpack files

on:
  workflow_dispatch:
    inputs:
      minecraft_version:
        description: 'Minecraft Version'
        required: true
        default: '1.21.1'
      loader:
        description: 'Mod Loader'
        required: true
        default: 'neoforge'
      loader_version:
        description: 'Loader Version'
        required: true
        default: '21.1.25'
      pack_version:
        description: 'Pack Version'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build .mrpack files
        run: |
          # Find all directories containing "overrides" in their name (excluding hidden folders)
          find . -maxdepth 1 -type d -name "*overrides*" ! -name ".*" | while read -r dir; do
            dirname=$(basename "$dir")
            echo "Processing directory: $dirname"
            
            # Create a temporary workspace
            tmp_dir="tmp_$dirname"
            rm -rf "$tmp_dir"
            mkdir -p "$tmp_dir/overrides"
            
            # Copy contents of the directory into the overrides folder if not empty
            if [ -n "$(ls -A "$dir")" ]; then
              cp -r "$dir"/* "$tmp_dir/overrides/"
            fi
            
            # Copy LICENSE if it exists
            if [ -f "LICENSE" ]; then
              cp "LICENSE" "$tmp_dir/"
            fi
            
            # Create index.json if it doesn't exist
            if [ -f "$tmp_dir/overrides/index.json" ]; then
              echo "Using existing index.json from $dir"
              mv "$tmp_dir/overrides/index.json" "$tmp_dir/index.json"
            else
              # Create a nice name from the directory name (e.g., overrides_client -> Overrides Client)
              pack_name=$(echo "$dirname" | sed 's/_/ /g' | sed -e 's/\b\(.\)/\u\1/g')
              full_pack_name="${{ github.event.repository.name }} - ${pack_name}"
              
              cat <<EOF > "$tmp_dir/index.json"
          {
            "formatVersion": 1,
            "game": "minecraft",
            "versionId": "${{ github.event.inputs.pack_version }}",
            "name": "${full_pack_name}",
            "summary": "Modpack for ${{ github.event.inputs.minecraft_version }} built from ${dirname}",
            "files": [],
            "dependencies": {
              "minecraft": "${{ github.event.inputs.minecraft_version }}",
              "${{ github.event.inputs.loader }}": "${{ github.event.inputs.loader_version }}"
            }
          }
          EOF
            fi
            
            # Create the ZIP (.mrpack)
            cd "$tmp_dir"
            zip -r "../$dirname.mrpack" .
            cd ..
            
            # Clean up
            rm -rf "$tmp_dir"
          done

      - name: Upload .mrpack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-mrpacks
          path: "*.mrpack"
