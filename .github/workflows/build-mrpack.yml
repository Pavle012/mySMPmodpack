name: Build .mrpack files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build .mrpack files
        run: |
          # Find all directories containing "overrides" in their name (excluding hidden folders)
          find . -maxdepth 1 -type d -name "*overrides*" ! -name ".*" | while read -r dir; do
            dirname=$(basename "$dir")
            echo "Processing directory: $dirname"
            
            # Create a temporary workspace
            tmp_dir="tmp_$dirname"
            rm -rf "$tmp_dir"
            mkdir -p "$tmp_dir/overrides"
            
            # Copy contents of the directory into the overrides folder if not empty
            if [ -n "$(ls -A "$dir")" ]; then
              cp -r "$dir"/* "$tmp_dir/overrides/"
            fi
            
            # Copy LICENSE if it exists
            if [ -f "LICENSE" ]; then
              cp "LICENSE" "$tmp_dir/"
            fi
            
            # Check for modrinth.index.json in the source directory
            if [ -f "$dir/modrinth.index.json" ]; then
              echo "Using already included modrinth.index.json from $dir"
              cp "$dir/modrinth.index.json" "$tmp_dir/index.json"
              # Ensure it doesn't end up inside the overrides folder too
              rm -f "$tmp_dir/overrides/modrinth.index.json"
            elif [ -f "$tmp_dir/overrides/index.json" ]; then
              echo "Using existing index.json from overrides folder"
              mv "$tmp_dir/overrides/index.json" "$tmp_dir/index.json"
            else
              echo "Error: No modrinth.index.json or index.json found in $dir. Skipping."
              rm -rf "$tmp_dir"
              continue
            fi
            
            # Create the ZIP (.mrpack)
            cd "$tmp_dir"
            zip -r "../$dirname.mrpack" .
            cd ..
            
            # Clean up
            rm -rf "$tmp_dir"
          done

      - name: Upload .mrpack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-mrpacks
          path: "*.mrpack"
