name: Build .mrpack files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build .mrpack files
        run: |
          # Find all directories containing "overrides" in their name (excluding hidden folders)
          find . -maxdepth 1 -type d -name "*overrides*" ! -name ".*" | while read -r dir; do
            dirname=$(basename "$dir")
            echo "Processing directory: $dirname"
            
            # Create a temporary workspace
            tmp_dir="tmp_$dirname"
            rm -rf "$tmp_dir"
            mkdir -p "$tmp_dir/overrides"
            
            # Copy contents of the directory into the overrides folder if not empty
            if [ -n "$(ls -A "$dir")" ]; then
              cp -r "$dir"/* "$tmp_dir/overrides/"
            fi
            
            # Copy LICENSE if it exists
            if [ -f "LICENSE" ]; then
              cp "LICENSE" "$tmp_dir/"
            fi
            
            # Resolve the modrinth.index.json for the mrpack
            if [ -f "$dir/modrinth.index.json" ]; then
              echo "Using $dir/modrinth.index.json"
              cp "$dir/modrinth.index.json" "$tmp_dir/modrinth.index.json"
              # Ensure it doesn't end up inside the overrides folder too
              rm -f "$tmp_dir/overrides/modrinth.index.json"
            elif [ -f "modrinth.index.json" ]; then
              echo "Using root modrinth.index.json and updating its name"
              # Create a nice name from the directory name (e.g., overrides_client -> Overrides Client)
              pack_name=$(echo "$dirname" | sed 's/_/ /g' | sed -e 's/\b\(.\)/\u\1/g')
              full_pack_name="${{ github.event.repository.name }} - ${pack_name}"
              
              # Use the root file but update the name field
              jq --arg name "$full_pack_name" '.name = $name' modrinth.index.json > "$tmp_dir/modrinth.index.json"
            else
              echo "Error: No modrinth.index.json found in $dir or root. Skipping."
              rm -rf "$tmp_dir"
              continue
            fi
            
            # Create the ZIP (.mrpack)
            cd "$tmp_dir"
            zip -r "../$dirname.mrpack" .
            cd ..
            
            # Clean up
            rm -rf "$tmp_dir"
          done

      - name: Upload .mrpack artifacts
        uses: actions/upload-artifact@v4
        with:
          name: modpack-mrpacks
          path: "*.mrpack"
